<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Cobrinha</title>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      margin-bottom: 10px;
    }

    canvas {
      background: #222;
      border: 4px solid lime;
      box-shadow: 0 0 20px lime;
    }

    p {
      margin-top: 10px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🐍 Jogo da Cobrinha</h1>
    <canvas id="game" width="400" height="400"></canvas>
    <p>Use as setas do teclado para jogar</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const tamanho = 20;
    const quantidade = canvas.width / tamanho;

    let cobra = [
      { x: 10, y: 10 }
    ];

    let direcao = { x: 0, y: 0 };

    let comida = {
      x: Math.floor(Math.random() * quantidade),
      y: Math.floor(Math.random() * quantidade)
    };

    function desenharJogo() {
      // Fundo
      ctx.fillStyle = '#222';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Cobra
      ctx.fillStyle = 'lime';
      cobra.forEach(parte => {
        ctx.fillRect(parte.x * tamanho, parte.y * tamanho, tamanho - 2, tamanho - 2);
      });

      // Comida
      ctx.fillStyle = 'red';
      ctx.fillRect(comida.x * tamanho, comida.y * tamanho, tamanho - 2, tamanho - 2);

      // Movimento da cabeça
      const cabeca = {
        x: cobra[0].x + direcao.x,
        y: cobra[0].y + direcao.y
      };

      // Passar pela parede
      if (cabeca.x < 0) cabeca.x = quantidade - 1;
      if (cabeca.y < 0) cabeca.y = quantidade - 1;
      if (cabeca.x >= quantidade) cabeca.x = 0;
      if (cabeca.y >= quantidade) cabeca.y = 0;

      // Colisão com o próprio corpo
      for (let parte of cobra) {
        if (parte.x === cabeca.x && parte.y === cabeca.y) {
          alert('💀 Game Over!');
          cobra = [{ x: 10, y: 10 }];
          direcao = { x: 0, y: 0 };
        }
      }

      cobra.unshift(cabeca);

      // Comer comida
      if (cabeca.x === comida.x && cabeca.y === comida.y) {
        comida = {
          x: Math.floor(Math.random() * quantidade),
          y: Math.floor(Math.random() * quantidade)
        };
      } else {
        cobra.pop();
      }
    }

    document.addEventListener('keydown', evento => {
      switch (evento.key) {
        case 'ArrowUp':
          if (direcao.y === 0) {
            direcao = { x: 0, y: -1 };
          }
          break;

        case 'ArrowDown':
          if (direcao.y === 0) {
            direcao = { x: 0, y: 1 };
          }
          break;

        case 'ArrowLeft':
          if (direcao.x === 0) {
            direcao = { x: -1, y: 0 };
          }
          break;

        case 'ArrowRight':
          if (direcao.x === 0) {
            direcao = { x: 1, y: 0 };
          }
          break;
      }
    });

    setInterval(desenharJogo, 120);
  </script>

</body>
</html>
