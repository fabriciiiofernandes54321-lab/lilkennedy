<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>

  <style>
    body {
      background: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .calculadora {
      background: #2b2b2b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #resultado {
      width: 100%;
      height: 60px;
      font-size: 28px;
      margin-bottom: 15px;
      text-align: right;
      padding-right: 10px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
    }

    .botoes {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 10px;
    }

    button {
      height: 60px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #444;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #666;
    }

    .igual {
      background: #ff9500;
    }

    .igual:hover {
      background: #ffb347;
    }

    .limpar {
      background: #d9534f;
    }

    .limpar:hover {
      background: #ff6b66;
    }
  </style>
</head>

<body>

  <div class="calculadora">
    <input type="text" id="resultado" disabled>

    <div class="botoes">
      <button onclick="adicionar('7')">7</button>
      <button onclick="adicionar('8')">8</button>
      <button onclick="adicionar('9')">9</button>
      <button onclick="adicionar('/')">÷</button>

      <button onclick="adicionar('4')">4</button>
      <button onclick="adicionar('5')">5</button>
      <button onclick="adicionar('6')">6</button>
      <button onclick="adicionar('*')">×</button>

      <button onclick="adicionar('1')">1</button>
      <button onclick="adicionar('2')">2</button>
      <button onclick="adicionar('3')">3</button>
      <button onclick="adicionar('-')">−</button>

      <button onclick="adicionar('0')">0</button>
      <button onclick="adicionar('.')">.</button>
      <button class="igual" onclick="calcular()">=</button>
      <button onclick="adicionar('+')">+</button>

      <button class="limpar" onclick="limpar()" style="grid-column: span 4;">
        Limpar
      </button>
    </div>
  </div>

  <script>
    const resultado = document.getElementById("resultado");

    function adicionar(valor) {
      resultado.value += valor;
    }

    function calcular() {
      try {
        resultado.value = eval(resultado.value);
      } catch {
        resultado.value = "Erro";
      }
    }

    function limpar() {
      resultado.value = "";
    }
  </script>

</body>
</html>
